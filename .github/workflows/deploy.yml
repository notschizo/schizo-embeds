name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions: write-all
    strategy:
      matrix:
        environment: ${{ fromJSON(vars.ENV_LIST) }}
    name: Cleanup
    steps:
      - name: Clean up previous deployments
        uses: strumwolf/delete-deployment-environment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: ${{ matrix.environment }}
          onlyRemoveDeployments: true

      - name: Delete old workflow runs
        if: strategy.job-index == 0
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 1

  deploy:
    needs: cleanup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJSON(vars.ENV_LIST) }}
    environment: ${{ matrix.environment }}
    name: Deploy
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch encrypted credentials from R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_CREDENTIALS_BUCKET }}
          R2_PRESIGN_EXPIRES_IN: '900'
        run: |
          set -euo pipefail
          R2_URL="$(node tools/credential-tools.mjs presign)"
          curl --fail -fSL -o credentials.enc.json "$R2_URL"
          jq -e '
            (.ciphertext | type == "string" and length > 0) and
            (.iv | type == "string" and length > 0)
          ' credentials.enc.json >/dev/null \
            || { echo "::error::credentials.enc.json must contain non-empty ciphertext and iv strings"; exit 1; }

      - name: Move branding.json
        run: |
          cp "./branding/${{ vars.CF_WORKER_NAME }}.json" "./branding.json"

      - name: Create wrangler.toml
        run: |
          cat << EOF > wrangler.toml
          name = "${{ vars.CF_WORKER_NAME }}"
          account_id = "${{ secrets.CF_ACCOUNT_ID }}"
          main = "./dist/worker.js"
          compatibility_date = "${{ vars.CF_COMPATIBILITY_DATE }}"
          send_metrics = false
          no_bundle = true
          analytics_engine_datasets = [
            { binding = "AnalyticsEngine" }
          ]

          [ai]
          binding = "AI"

          [build]
          command = "npm run build"
          EOF

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          STANDARD_DOMAIN_LIST: ${{ vars.DOMAIN }},fxtwitter.com,fixupx.com,twittpr.com
          STANDARD_BSKY_DOMAIN_LIST: ${{ vars.STANDARD_BSKY_DOMAIN_LIST }}
          STANDARD_TIKTOK_DOMAIN_LIST: ${{ vars.STANDARD_TIKTOK_DOMAIN_LIST }}
          DIRECT_MEDIA_DOMAINS: d.${{ vars.DOMAIN }},d.fxtwitter.com,dl.fxtwitter.com,d.twittpr.com,dl.twittpr.com,d.fixupx.com,d.xfixup.com,dl.fixupx.com,dl.xfixup.com
          TEXT_ONLY_DOMAINS: t.${{ vars.DOMAIN }},t.fxtwitter.com,t.twittpr.com,t.fixupx.com
          INSTANT_VIEW_DOMAINS: i.${{ vars.DOMAIN }},i.fxtwitter.com,i.twittpr.com,i.fixupx.com
          GALLERY_DOMAINS: g.${{ vars.DOMAIN }},g.fxtwitter.com,g.twittpr.com,g.fixupx.com
          FORCE_MOSAIC_DOMAINS: m.${{ vars.DOMAIN }},m.fxtwitter.com,m.twittpr.com,m.fixupx.com
          QUIET_DOMAINS: ${{ vars.QUIET_DOMAINS }}
          OLD_EMBED_DOMAINS: o.${{ vars.DOMAIN }},o.fxtwitter.com,o.twittpr.com,o.fixupx.com,o.fxbsky.app
          MOSAIC_DOMAIN_LIST: ${{ vars.MOSAIC_DOMAIN_LIST }}
          POLYGLOT_DOMAIN_LIST: ${{ vars.POLYGLOT_DOMAIN_LIST }}
          POLYGLOT_ACCESS_TOKEN: ${{ secrets.POLYGLOT_ACCESS_TOKEN }}
          MOSAIC_BSKY_DOMAIN_LIST: ${{ vars.MOSAIC_BSKY_DOMAIN_LIST }}
          MEDIA_PROXY_DOMAIN_LIST: ${{ vars.MEDIA_PROXY_DOMAIN_LIST }}
          GIF_TRANSCODE_DOMAIN_LIST: ${{ vars.GIF_TRANSCODE_DOMAIN_LIST }}
          VIDEO_TRANSCODE_DOMAIN_LIST: ${{ vars.VIDEO_TRANSCODE_DOMAIN_LIST }}
          VIDEO_TRANSCODE_BSKY_DOMAIN_LIST: ${{ vars.VIDEO_TRANSCODE_BSKY_DOMAIN_LIST }}
          PBS_PROXY_DOMAIN_LIST: ${{ vars.PBS_PROXY_DOMAIN_LIST }}
          API_HOST_LIST: ${{ vars.API_HOST_LIST }}
          BLUESKY_API_HOST_LIST: ${{ vars.BLUESKY_API_HOST_LIST }}
          ATMOSPHERE_API_HOST_LIST: ${{ vars.ATMOSPHERE_API_HOST_LIST }}
          TWITTER_ROOT: ${{ vars.TWITTER_ROOT }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --no-bundle
